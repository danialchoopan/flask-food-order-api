<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}دانیال فست فود{% endblock %}</title>
    <script src="{{ url_for('static', filename='js/tailwind.js') }}"></script>
    <style>
        @font-face {
            font-family: 'Vazir';
            src: url("{{ url_for('static', filename='fonts/Vazir.woff2') }}") format('woff2');
        }
        body {
            font-family: 'Vazir', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">
    <nav class="bg-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="/" class="text-2xl font-bold text-red-600">دانیال فست فود</a>
                </div>
                <div class="flex items-center space-x-4 space-x-reverse">
                    <a href="/" class="text-gray-700 hover:text-red-600">رستوران‌ها</a>
                    {% if session.user_id %}
                        <a href="/orders" class="text-gray-700 hover:text-red-600">سفارشات من</a>
                        <a href="/logout" class="text-gray-700 hover:text-red-600">خروج</a>
                    {% else %}
                        <a href="/login" class="text-gray-700 hover:text-red-600">ورود</a>
                    {% endif %}
                    <a href="/admin/login" class="text-gray-700 hover:text-red-600">پنل مدیریت</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-white mt-12 border-t border-gray-200">
        <div class="max-w-7xl mx-auto py-6 px-4 text-center text-gray-500">
            &copy; ۱۴۰۵ سامانه سفارش غذای دانیال فست فود. تمامی حقوق محفوظ است.
        </div>
    </footer>
</body>
</html>
